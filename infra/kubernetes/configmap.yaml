apiVersion: v1
kind: ConfigMap
metadata:
  name: auction-config
  namespace: auction
data:
  DB_URL: jdbc:postgresql://postgres:5432/auction
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  USER_SERVICE_BASE_URL: http://user-service:3001
  AUTH_SERVICE_BASE_URL: http://auth-service:3002
  AUCTION_SERVICE_BASE_URL: http://auction-service:3003
  BID_SERVICE_BASE_URL: http://bid-service:3004
  NOTIFICATION_SERVICE_BASE_URL: http://notification-service:3005
  APP_CORS_ALLOWED_ORIGINS: http://auction.localtest.me,http://localhost:8080,http://127.0.0.1:8080
  AUCTION_SCHEDULER_ENABLED: "true"
  AUCTION_DURATION_SECONDS: "30"
  FRONTEND_USER_API_URL: /user-api
  FRONTEND_AUTH_API_URL: /auth-api
  FRONTEND_AUCTION_API_URL: /auction-api
  FRONTEND_BID_API_URL: /bid-api
  FRONTEND_NOTIFICATION_API_URL: /notification-api
