apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: auction
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: ghcr.io/akashnixon/auction-auth-service:deployment
          ports:
            - containerPort: 3002
              name: http
          envFrom:
            - configMapRef:
                name: auction-config
            - secretRef:
                name: auction-secrets
          env:
            - name: PORT
              value: "3002"
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: auction
spec:
  selector:
    app: auth-service
  ports:
    - name: http
      port: 3002
      targetPort: http
