apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: auction-frontend
  namespace: auction
spec:
  ingressClassName: nginx
  rules:
    - host: auction.localtest.me
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: auction-api
  namespace: auction
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
spec:
  ingressClassName: nginx
  rules:
    - host: auction.localtest.me
      http:
        paths:
          - path: /user-api(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: user-service
                port:
                  number: 3001
          - path: /auth-api(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: auth-service
                port:
                  number: 3002
          - path: /auction-api(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: auction-service
                port:
                  number: 3003
          - path: /bid-api(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: bid-service
                port:
                  number: 3004
          - path: /notification-api(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: notification-service
                port:
                  number: 3005
