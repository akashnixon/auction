apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: auction
spec:
  replicas: 1
  revisionHistoryLimit: 2
  minReadySeconds: 10
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      terminationGracePeriodSeconds: 30
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: notification-service
          image: ghcr.io/akashnixon/auction-notification-service:deployment
          imagePullPolicy: Always
          ports:
            - containerPort: 3005
              name: http
          envFrom:
            - configMapRef:
                name: auction-config
            - secretRef:
                name: auction-secrets
          env:
            - name: PORT
              value: "3005"
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 3
          resources:
            requests:
              cpu: 150m
              memory: 256Mi
            limits:
              cpu: 750m
              memory: 768Mi
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: auction
spec:
  selector:
    app: notification-service
  ports:
    - name: http
      port: 3005
      targetPort: http
  type: ClusterIP
