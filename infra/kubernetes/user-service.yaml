apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: auction
spec:
  replicas: 2
  revisionHistoryLimit: 2
  minReadySeconds: 10
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      terminationGracePeriodSeconds: 30
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: user-service
          image: ghcr.io/akashnixon/auction-user-service:deployment
          ports:
            - containerPort: 3001
              name: http
          envFrom:
            - configMapRef:
                name: auction-config
            - secretRef:
                name: auction-secrets
          env:
            - name: PORT
              value: "3001"
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: auction
spec:
  selector:
    app: user-service
  ports:
    - name: http
      port: 3001
      targetPort: http
  type: ClusterIP
