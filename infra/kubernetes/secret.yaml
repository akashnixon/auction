apiVersion: v1
kind: Secret
metadata:
  name: auction-secrets
  namespace: auction
type: Opaque
stringData:
  DB_USER: replace-with-db-user
  DB_PASSWORD: replace-with-strong-db-password
  JWT_SECRET: replace-with-strong-jwt-secret
  POSTGRES_DB: auction
  POSTGRES_USER: replace-with-postgres-user
  POSTGRES_PASSWORD: replace-with-strong-postgres-password
