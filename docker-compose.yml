services:
  postgres:
    image: postgres:16-alpine
    container_name: auction-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: auction
      POSTGRES_USER: auction
      POSTGRES_PASSWORD: auction
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  postgres-init:
    image: postgres:16-alpine
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: auction
    volumes:
      - ./scripts/init-db.sql:/scripts/init-db.sql:ro
      - ./scripts/seed-data.sql:/scripts/seed-data.sql:ro
    command:
      - sh
      - -c
      - |
        psql "postgresql://auction:auction@postgres:5432/auction" -f /scripts/init-db.sql &&
        if [ -s /scripts/seed-data.sql ]; then
          psql "postgresql://auction:auction@postgres:5432/auction" -f /scripts/seed-data.sql;
        fi
    restart: "no"

  redis:
    image: redis:7-alpine
    container_name: auction-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s

  user-service:
    build:
      context: ./services/user-service
    image: auction/user-service:local
    restart: unless-stopped
    depends_on:
      postgres-init:
        condition: service_completed_successfully
    environment:
      PORT: 3001
      DB_URL: jdbc:postgresql://postgres:5432/auction
      DB_USER: auction
      DB_PASSWORD: auction
      APP_CORS_ALLOWED_ORIGINS: http://localhost:8080,http://127.0.0.1:8080,http://localhost:5173,http://127.0.0.1:5173
    ports:
      - "3001:3001"

  auth-service:
    build:
      context: ./services/auth-service
    image: auction/auth-service:local
    restart: unless-stopped
    depends_on:
      user-service:
        condition: service_healthy
    environment:
      PORT: 3002
      USER_SERVICE_BASE_URL: http://user-service:3001
      JWT_SECRET: dev_secret_change_me_please_update
      JWT_EXPIRATION_SECONDS: 86400
      APP_CORS_ALLOWED_ORIGINS: http://localhost:8080,http://127.0.0.1:8080,http://localhost:5173,http://127.0.0.1:5173
    ports:
      - "3002:3002"

  auction-service:
    build:
      context: ./services/auction-service
    image: auction/auction-service:local
    restart: unless-stopped
    depends_on:
      postgres-init:
        condition: service_completed_successfully
      user-service:
        condition: service_healthy
      auth-service:
        condition: service_healthy
      bid-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy
    environment:
      PORT: 3003
      DB_URL: jdbc:postgresql://postgres:5432/auction
      DB_USER: auction
      DB_PASSWORD: auction
      USER_SERVICE_BASE_URL: http://user-service:3001
      BID_SERVICE_BASE_URL: http://bid-service:3004
      NOTIFICATION_SERVICE_BASE_URL: http://notification-service:3005
      AUTH_SERVICE_BASE_URL: http://auth-service:3002
      AUCTION_SCHEDULER_ENABLED: "true"
      AUCTION_SCHEDULER_LEADER: "true"
      AUCTION_DURATION_SECONDS: 30
      APP_CORS_ALLOWED_ORIGINS: http://localhost:8080,http://127.0.0.1:8080,http://localhost:5173,http://127.0.0.1:5173
    ports:
      - "3003:3003"

  bid-service:
    build:
      context: ./services/bid-service
    image: auction/bid-service:local
    restart: unless-stopped
    depends_on:
      postgres-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      user-service:
        condition: service_healthy
      auth-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy
    environment:
      PORT: 3004
      DB_URL: jdbc:postgresql://postgres:5432/auction
      DB_USER: auction
      DB_PASSWORD: auction
      REDIS_HOST: redis
      REDIS_PORT: 6379
      USER_SERVICE_BASE_URL: http://user-service:3001
      AUCTION_SERVICE_BASE_URL: http://auction-service:3003
      NOTIFICATION_SERVICE_BASE_URL: http://notification-service:3005
      AUTH_SERVICE_BASE_URL: http://auth-service:3002
      APP_CORS_ALLOWED_ORIGINS: http://localhost:8080,http://127.0.0.1:8080,http://localhost:5173,http://127.0.0.1:5173
    ports:
      - "3004:3004"

  notification-service:
    build:
      context: ./services/notification-service
    image: auction/notification-service:local
    restart: unless-stopped
    environment:
      PORT: 3005
      APP_CORS_ALLOWED_ORIGINS: http://localhost:8080,http://127.0.0.1:8080,http://localhost:5173,http://127.0.0.1:5173
    ports:
      - "3005:3005"

  frontend:
    build:
      context: ./frontend
      target: production
    image: auction/frontend:local
    restart: unless-stopped
    depends_on:
      user-service:
        condition: service_healthy
      auth-service:
        condition: service_healthy
      auction-service:
        condition: service_healthy
      bid-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy
    environment:
      FRONTEND_USER_API_URL: http://localhost:3001
      FRONTEND_AUTH_API_URL: http://localhost:3002
      FRONTEND_AUCTION_API_URL: http://localhost:3003
      FRONTEND_BID_API_URL: http://localhost:3004
      FRONTEND_NOTIFICATION_API_URL: http://localhost:3005
    ports:
      - "8080:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  frontend-dev:
    build:
      context: ./frontend
      target: development
    profiles:
      - dev
    depends_on:
      user-service:
        condition: service_healthy
      auth-service:
        condition: service_healthy
      auction-service:
        condition: service_healthy
      bid-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy
    environment:
      VITE_USER_API_URL: http://localhost:3001
      VITE_AUTH_API_URL: http://localhost:3002
      VITE_AUCTION_API_URL: http://localhost:3003
      VITE_BID_API_URL: http://localhost:3004
      VITE_NOTIFICATION_API_URL: http://localhost:3005
    ports:
      - "5173:5173"

volumes:
  postgres-data:
