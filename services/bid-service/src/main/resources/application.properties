server.port=${PORT:3004}

services.user.base-url=${USER_SERVICE_BASE_URL:http://localhost:3001}
services.auction.base-url=${AUCTION_SERVICE_BASE_URL:http://localhost:3003}
services.notification.base-url=${NOTIFICATION_SERVICE_BASE_URL:http://localhost:3005}

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/auction}
spring.datasource.username=${DB_USER:auction}
spring.datasource.password=${DB_PASSWORD:auction}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
