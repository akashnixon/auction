name: CI

on:
  push:
    branches:
      - main
      - deployment
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  infra-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Docker Compose
        run: docker compose config

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.31.0

      - name: Validate Kubernetes manifests
        run: kubectl kustomize infra/kubernetes >/dev/null

  backend-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - user-service
          - auth-service
          - auction-service
          - bid-service
          - notification-service
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Run Maven tests
        working-directory: services/${{ matrix.service }}
        run: mvn -B test

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  docker-images:
    runs-on: ubuntu-latest
    needs:
      - infra-validate
      - backend-tests
      - frontend-build
    strategy:
      fail-fast: false
      matrix:
        include:
          - image_name: auction-user-service
            context: ./services/user-service
          - image_name: auction-auth-service
            context: ./services/auth-service
          - image_name: auction-auction-service
            context: ./services/auction-service
          - image_name: auction-bid-service
            context: ./services/bid-service
          - image_name: auction-notification-service
            context: ./services/notification-service
          - image_name: auction-frontend
            context: ./frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute registry owner
        id: owner
        run: echo "value=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.owner.outputs.value }}/${{ matrix.image_name }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=sha

      - name: Build and optionally push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: ${{ github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/deployment') }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
